<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Brawl Stars Box Simulator</title>
    <style>
        :root {
            --common: #b1b1b1;
            --rare: #46e246;
            --super-rare: #3ca0ff;
            --epic: #d84eff;
            --mythic: #ff4e70;
            --legendary: #fff14e;
            --power-point: #ff9f43;
        }
        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background: linear-gradient(135deg, #090e18, #162447);
            color: white;
            text-align: center;
            padding: 10px;
            margin: 0;
            user-select: none;
            overflow-x: hidden;
        }
        .container {
            max-width: 700px;
            margin: 10px auto;
            background: rgba(22, 36, 71, 0.95);
            padding: 20px;
            border-radius: 24px;
            border: 5px solid #1f4068;
            box-shadow: 0px 20px 45px rgba(0,0,0,0.8);
        }
        .header-title {
            font-size: 36px;
            color: #f4b41a;
            text-shadow: 3px 3px #000;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 16px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .stat-item { background: #111726; padding: 8px; border-radius: 8px; border: 1px solid #333; }
        
        /* Box Selection Hub */
        .shop-layout {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .box-card {
            padding: 15px 5px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: 3px solid #000;
            border-radius: 16px;
            cursor: pointer;
            text-shadow: 2px 2px #000;
            box-shadow: 0 6px 0 #000;
            transition: transform 0.05s, box-shadow 0.05s;
        }
        .box-card:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }
        .brawl-btn { background: linear-gradient(#3ca0ff, #1d72c2); }
        .big-btn { background: linear-gradient(#ff4e70, #b81d3d); }
        .mega-btn { background: linear-gradient(#ffdd00, #d48800); color: #000; text-shadow: none; }

        /* Complex Interactive Opening Screen Overlay */
        .box-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(31,64,104,1) 0%, rgba(10,15,30,1) 100%);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .box-render {
            font-size: 100px;
            cursor: pointer;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }
        .items-left {
            position: absolute;
            bottom: 15%;
            right: 15%;
            background: #e43f5a;
            color: white;
            padding: 15px 25px;
            border-radius: 50%;
            font-size: 28px;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .reward-display {
            font-size: 40px;
            text-shadow: 4px 4px #000;
            text-align: center;
        }

        /* Upgradable Character Grid */
        .grid-system {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .character-node {
            background: #1f4068;
            padding: 12px;
            border-radius: 14px;
            border: 3px solid #000;
            opacity: 0.35;
            position: relative;
        }
        .character-node.active { opacity: 1; border-color: #f4b41a; }
        .power-bar-bg {
            background: #111;
            border-radius: 10px;
            height: 16px;
            margin: 8px 0;
            position: relative;
            overflow: hidden;
            border: 1px solid #444;
        }
        .power-bar-fill {
            background: var(--power-point);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .power-text {
            position: absolute;
            width: 100%;
            font-family: Arial;
            font-size: 11px;
            font-weight: bold;
            top: 0; left: 0;
            color: #fff;
            text-shadow: 1px 1px #000;
        }
        .upgrade-btn {
            background: #46e246;
            color: black;
            border: 2px solid black;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            display: none;
            width: 100%;
            box-sizing: border-box;
        }
        .disclaimer { font-family: Arial; font-size: 10px; color: #555; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">STAR SIMULATOR ULTRA</div>
    
    <div class="stats-bar">
        <div class="stat-item">💰 Gold<br><span id="coins">0</span></div>
        <div class="stat-item">💎 Gems<br><span id="gems">200</span></div>
        <div class="stat-item">⚡ Points<br><span id="pp">0</span></div>
        <div class="stat-item">📈 Luck<br><span id="chance">0.11%</span></div>
    </div>

    <div class="shop-layout">
        <button class="box-card brawl-btn" onclick="buildBox('brawl')">Brawl Box<br><small>Free</small></button>
        <button class="box-card big-btn" onclick="buildBox('big')">Big Box<br><small>30 Gems</small></button>
        <button class="box-card mega-btn" onclick="buildBox('mega')">Mega Box<br><small>80 Gems</small></button>
    </div>

    <div class="header-title" style="font-size: 22px;">ROSTER & UPGRADES (<span id="unlocked-txt">0</span>/12)</div>
    <div class="grid-system" id="roster"></div>
    
    <button onclick="resetData()" style="margin-top:20px; background:#333; color:#aaa; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Reset Progress</button>
</div>

<div class="box-screen" id="screen" onclick="popQueue()">
    <div id="rewardZone" class="reward-display"></div>
    <div id="boxAsset" class="box-render">🎁</div>
    <div id="badge" class="items-left">0</div>
</div>

<p class="disclaimer">This website simulator is entirely unofficial fan content compliant with Supercell's Fan Content Rules.</p>

<script>
    // Audio Synth Engine (Allows audio generation without external .mp3 file links!)
    const audio = {
        ctx: null,
        init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        play(freq, type, duration) {
            this.init(); let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
            osc.type = type; osc.frequency.value = freq; gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);
            osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + duration);
        }
    };

    // Game Local Database Memory Structure
    let saveState = {
        coins: 500, gems: 200, globalPP: 0, luck: 0.1100,
        unlocked: ["shelly"],
        brawlerPP: {}, brawlerLv: {}
    };

    const database = [
        { id: "shelly", name: "Shelly", rarity: "Common", color: "var(--common)" },
        { id: "colt", name: "Colt", rarity: "Common", color: "var(--common)" },
        { id: "elprimo", name: "El Primo", rarity: "Rare", color: "var(--rare)" },
        { id: "poco", name: "Poco", rarity: "Rare", color: "var(--rare)" },
        { id: "darryl", name: "Darryl", rarity: "Super-Rare", color: "var(--super-rare)" },
        { id: "rico", name: "Rico", rarity: "Super-Rare", color: "var(--super-rare)" },
        { id: "piper", name: "Piper", rarity: "Epic", color: "var(--epic)" },
        { id: "frank", name: "Frank", rarity: "Epic", color: "var(--epic)" },
        { id: "mortis", name: "Mortis", rarity: "Mythic", color: "var(--mythic)" },
        { id: "tara", name: "Tara", rarity: "Mythic", color: "var(--mythic)" },
        { id: "spike", name: "Spike", rarity: "Legendary", color: "var(--legendary)" },
        { id: "leon", name: "Leon", rarity: "Legendary", color: "var(--legendary)" }
    ];

    // Scaling level cost metrics matching original balance algorithms
    const upgradeCosts = [0, 20, 35, 75, 140, 290, 480, 800, 1250, 1875, 2800];
    const ppRequirements = [0, 20, 30, 50, 80, 130, 210, 340, 550, 890, 1440];

    let actionQueue = [], queueStep = 0, targetBox = '';

    function initGame() {
        if(localStorage.getItem("bs_sim_save")) {
            saveState = JSON.parse(localStorage.getItem("bs_sim_save"));
        }
        database.forEach(b => {
            if(!saveState.brawlerPP[b.id]) saveState.brawlerPP[b.id] = 0;
            if(!saveState.brawlerLv[b.id]) saveState.brawlerLv[b.id] = 1;
        });
        buildRosterUI();
        refreshDOM();
    }

    function saveGame() { localStorage.setItem("bs_sim_save", JSON.stringify(saveState)); }
    function resetData() { localStorage.clear(); location.reload(); }

    function buildRosterUI() {
        const r = document.getElementById("roster"); r.innerHTML = "";
        database.forEach(b => {
            r.innerHTML += `
                <div class="character-node" id="node-${b.id}" style="background: linear-gradient(145deg, #162447, ${b.color}22)">
                    <div style="color:${b.color}; font-size:11px;">${b.rarity.toUpperCase()}</div>
                    <div style="font-size:18px; margin:2px 0;">${b.name}</div>
                    <div style="font-size:12px; color:#fff;">Lvl <span id="lv-${b.id}">1</span></div>
                    <div class="power-bar-bg">
                        <div class="power-bar-fill" id="fill-${b.id}"></div>
                        <div class="power-text" id="pp-txt-${b.id}">0/20</div>
                    </div>
                    <button class="upgrade-btn" id="up-btn-${b.id}" onclick="triggerUpgrade('${b.id}')">UPGRADE</button>
                </div>`;
        });
    }

    function refreshDOM() {
        document.getElementById("coins").innerText = saveState.coins;
        document.getElementById("gems").innerText = saveState.gems;
        document.getElementById("pp").innerText = saveState.globalPP;
        document.getElementById("chance").innerText = saveState.luck.toFixed(4) + "%";
        document.getElementById("unlocked-txt").innerText = saveState.unlocked.length;

        database.forEach(b => {
            const has = saveState.unlocked.includes(b.id);
            const card = document.getElementById(`node-${b.id}`);
            if(has) {
                card.classList.add("active");
                let curLv = saveState.brawlerLv[b.id];
                let curPP = saveState.brawlerPP[b.id];
                let reqPP = ppRequirements[curLv] || 0;
                let cost = upgradeCosts[curLv] || 0;
                
                document.getElementById(`lv-${b.id}`).innerText = curLv;
                document.getElementById(`pp-txt-${b.id}`).innerText = curLv >= 11 ? "MAX" : `${curPP}/${reqPP}`;
                
                let pct = curLv >= 11 ? 100 : Math.min((curPP / reqPP) * 100, 100);
                document.getElementById(`fill-${b.id}`).style.width = pct + "%";
                
                let upBtn = document.getElementById(`up-btn-${b.id}`);
                if(curLv < 11 && curPP >= reqPP && saveState.coins >= cost) {
                    upBtn.style.display = "block";
                    upBtn.innerText = `UPGRADE 💰${cost}`;
                } else { upBtn.style.display = "none"; }
            }
        });
        saveGame();
    }

    function buildBox(type) {
        if(type==='big')   { if(saveState.gems < 30) { audio.play(150, 'sawtooth', 0.2); return; } saveState.gems -= 30; }
        if(type==='mega')  { if(saveState.gems < 80) { audio.play(150, 'sawtooth', 0.2); return; } saveState.gems -= 80; }
        
        targetBox = type; actionQueue = []; queueStep = 0;
        audio.play(400, 'sine', 0.15);

        // Core gold formulas
        let gAmount = type==='mega' ? rand(250,500) : (type==='big' ? rand(90,180) : rand(30,70));
        actionQueue.push({ type: 'gold', val: gAmount });

        // Power Point distributions targeted exclusively to currently owned brawlers
        let ppPiles = type==='mega' ? 5 : (type==='big' ? 3 : 1);
        for(let i=0; i<ppPiles; i++) {
            let targetChar = saveState.unlocked[Math.floor(Math.random() * saveState.unlocked.length)];
            let pts = type==='mega' ? rand(40,120) : (type==='big' ? rand(25,60) : rand(10,25));
            if(saveState.brawlerLv[targetChar] < 11) {
                actionQueue.push({ type: 'power', target: targetChar, val: pts });
            } else {
                actionQueue.push({ type: 'gold', val: pts * 2 }); // Max level character conversion override logic
            }
        }

        // Brawler pull roll loops
        let pullChances = type==='mega' ? 4 : (type==='big' ? 2 : 1);
        for(let k=0; k<pullChances; k++) {
            let roll = Math.random() * 100;
            if(roll < saveState.luck) actionQueue.push({ type:'drop', rare:'Legendary'});
            else if(roll < saveState.luck + 1.2) actionQueue.push({ type:'drop', rare:'Mythic'});
            else if(roll < 7) actionQueue.push({ type:'drop', rare:'Epic'});
            else if(roll < 18) actionQueue.push({ type:'drop', rare:'Super-Rare'});
            else if(roll < 40) actionQueue.push({ type:'drop', rare:'Rare'});
            else if(roll < 65) actionQueue.push({ type:'drop', rare:'Common'});
        }

        // Setup Overlay display state
        document.getElementById("screen").style.display = "flex";
        document.getElementById("boxAsset").style.display = "block";
        document.getElementById("rewardZone").innerHTML = type.toUpperCase() + " BOX";
        document.getElementById("badge").innerText = actionQueue.length;
    }

    function popQueue() {
        const asset = document.getElementById("boxAsset");
        if(asset.style.display !== "none") { asset.style.display = "none"; }

        if(queueStep < actionQueue.length) {
            let obj = actionQueue[queueStep];
            document.getElementById("badge").innerText = (actionQueue.length - 1) - queueStep;
            audio.play(600 + (queueStep * 50), 'sine', 0.1);

            if(obj.type === 'gold') {
                saveState.coins += obj.val;
                document.getElementById("rewardZone").innerHTML = `💰<br>+${obj.val}<br><span style="color:#fff">Gold</span>`;
            } 
            else if(obj.type === 'power') {
                saveState.brawlerPP[obj.target] += obj.val;
                let cName = database.find(x => x.id === obj.target).name;
                document.getElementById("rewardZone").innerHTML = `⚡<br>+${obj.val} Points<br><span style="color:var(--power-point)">${cName}</span>`;
            }
            else if(obj.type === 'drop') {
                let list = database.filter(x => x.rarity === obj.rare);
                let pick = list[Math.floor(Math.random() * list.length)];
                
                if(!saveState.unlocked.includes(pick.id)) {
                    saveState.unlocked.push(pick.id);
                    audio.play(880, 'triangle', 0.4);
                    document.getElementById("rewardZone").innerHTML = `⭐ NEW BRAWLER! ⭐<br><span style="color:${pick.color}">${pick.name.toUpperCase()}</span><br><small>${pick.rarity}</small>`;
                    if(obj.rare === 'Legendary') saveState.luck = 0.1100;
                } else {
                    let refund = obj.rare === 'Legendary' ? 600 : 150;
                    saveState.coins += refund;
                    document.getElementById("rewardZone").innerHTML = `👟 DUPLICATE<br><span style="color:${pick.color}">${pick.name}</span><br><small>+${refund} Gold Refund</small>`;
                }
            }
            queueStep++;
        } else {
            saveState.luck += targetBox==='mega' ? 0.0060 : (targetBox==='big' ? 0.0025 : 0.0007);
            document.getElementById("screen").style.display = "none";
            refreshDOM();
        }
    }

    function triggerUpgrade(id) {
        let lv = saveState.brawlerLv[id];
        let cost = upgradeCosts[lv];
        let req = ppRequirements[lv];
        
        if(saveState.brawlerPP[id] >= req && saveState.coins >= cost) {
            saveState.brawlerPP[id] -= req;
            saveState.coins -= cost;
            saveState.brawlerLv[id]++;
            audio.play(523.25, 'sine', 0.3); // Play C5 musical upgrade note cord
            refreshDOM();
        }
    }

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    window.onload = initGame;
</script>
</body>
</html>
