<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Simulator Pro</title>
    <style>
        :root {
            --bs-blue: #0044ff;
            --bs-purple: #4c1c5c;
            --bs-yellow: #ffcc00;
            --bs-dark: #11141a;
            --rare-color: #00ff66;
            --super-rare-color: #00ccff;
            --epic-color: #d633ff;
            --mythic-color: #ff3333;
            --legendary-color: #ffcc00;
        }

        body {
            font-family: 'Impact', 'Arial Black', sans-serif;
            background: radial-gradient(circle, #2c1654 0%, #0d0614 100%);
            color: white;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-bottom: 4px solid var(--bs-yellow);
        }

        .resource-item {
            font-size: 1.4rem;
            text-shadow: 2px 2px 0px #000;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            justify-content: center;
            background: #1a102f;
            border-bottom: 2px solid #3d246b;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #888;
            padding: 15px 40px;
            font-size: 1.3rem;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
        }

        .tab-btn.active {
            color: var(--bs-yellow);
            border-bottom: 4px solid var(--bs-yellow);
            text-shadow: 2px 2px 0px #000;
        }

        .view-panel {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .view-panel.active {
            display: block;
        }

        /* Menu / Shop Style Grid */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .shop-card {
            background: linear-gradient(180deg, #3b2063 0%, #1c0e35 100%);
            border: 4px solid #54328c;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 0px #000;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .shop-card:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px #000;
        }

        .shop-card h3 {
            margin: 10px 0;
            font-size: 1.6rem;
            text-shadow: 2px 2px 0px #000;
        }

        /* Brawlers Catalog Grid */
        .brawlers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .brawler-card {
            background: #251b3a;
            border: 4px solid #443366;
            border-radius: 12px;
            padding: 10px;
            position: relative;
            text-align: center;
            filter: grayscale(80%);
            opacity: 0.6;
        }

        .brawler-card.unlocked {
            filter: grayscale(0%);
            opacity: 1;
            background: linear-gradient(135deg, #3d1b63 0%, #140724 100%);
        }

        /* Rarity Borders */
        .rarity-Rare { border-color: var(--rare-color); }
        .rarity-Super-Rare { border-color: var(--super-rare-color); }
        .rarity-Epic { border-color: var(--epic-color); }
        .rarity-Mythic { border-color: var(--mythic-color); }
        .rarity-Legendary { border-color: var(--legendary-color); }

        .brawler-name {
            font-size: 1.2rem;
            text-shadow: 2px 2px 0px #000;
            margin: 5px 0;
        }

        .brawler-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        /* Rewards Screen overlay */
        .overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .reward-box {
            font-size: 2.5rem;
            text-shadow: 4px 4px 0px #000;
            animation: popIn 0.3s ease-out;
            text-align: center;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); }
            100% { transform: scale(1); }
        }

        .upgrade-btn {
            background: #00ff66;
            border: none;
            padding: 5px 10px;
            font-family: inherit;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 3px 0 #009933;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="resource-item" style="color: var(--bs-yellow);">🪙 <span id="coins">1000</span></div>
        <div class="resource-item" style="color: #ff66cc;">⚡ <span id="powerPoints">200</span></div>
        <div class="resource-item" style="color: #00ccff;">🏆 <span id="unlockedCount">1</span>/107</div>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('shop')">Shop</button>
        <button class="tab-btn" onclick="switchTab('brawlers')">Brawlers</button>
    </div>

    <div id="shop" class="view-panel active">
        <h2>Brawl Boxes</h2>
        <div class="shop-grid">
            <div class="shop-card" onclick="openBox('Brawl Box')">
                <h3 style="color: #00ccff;">Brawl Box</h3>
                <p>Standard rewards</p>
            </div>
            <div class="shop-card" onclick="openBox('Big Box')">
                <h3 style="color: #ff3399;">Big Box</h3>
                <p>3x more rewards!</p>
            </div>
            <div class="shop-card" onclick="openBox('Mega Box')">
                <h3 style="color: var(--bs-yellow);">Mega Box</h3>
                <p>10x more rewards!</p>
            </div>
            <div class="shop-card" onclick="openBox('Omega Box')">
                <h3 style="color: #ff3333;">Omega Box</h3>
                <p>Ultimate absolute value!</p>
            </div>
        </div>

        <h2>Starr Drops</h2>
        <div class="shop-grid">
            <div class="shop-card" style="background: linear-gradient(180deg, #1f1235 0%, #4c1c5c 100%);" onclick="openStarrDrop()">
                <h3 style="color: #fff;">Tap to Roll Starr Drop</h3>
                <p>Rare up to Legendary!</p>
            </div>
        </div>
    </div>

    <div id="brawlers" class="view-panel">
        <h2>Brawler Catalog</h2>
        <div class="brawlers-grid" id="brawlersGrid"></div>
    </div>

    <div class="overlay" id="rewardOverlay" onclick="closeOverlay()">
        <div class="reward-box" id="rewardContent"></div>
        <p style="color: #888; margin-top: 30px;">Tap anywhere to dismiss</p>
    </div>

<script>
    // Game State
    let resources = { coins: 2000, powerPoints: 500 };
    let brawlers = [];

    // Configuration for dynamic generation of all 107 slots
    const rarities = ["Rare", "Super-Rare", "Epic", "Mythic", "Legendary"];
    
    // Generate 107 standardized mock Brawlers dynamically to fulfill the complete requirement
    function generateAllBrawlers() {
        // Starting Brawler
        brawlers.push({ id: "shelly", name: "Shelly", unlocked: true, level: 1, rarity: "Rare" });
        
        let namesPool = [
            "Colt", "Brock", "El Primo", "Poco", "Barley", "Rosa", "Bull", "Jessie", "Dynamike", "Tick", 
            "8-Bit", "Rico", "Darryl", "Penny", "Carl", "Jacky", "Gus", "Piper", "Pam", "Frank", 
            "Bibi", "Bea", "Nani", "Edgar", "Griff", "Grom", "Bonnie", "Gale", "Colette", "Lou", 
            "Kit", "Melodie", "Angelo", "Draco", "Lily", "Clancy", "Moe", "Kenji", "Juju", "Chaxie"
        ];

        for (let i = 2; i <= 107; i++) {
            let baseName = namesPool[(i - 2) % namesPool.length];
            let uniqueName = `${baseName} V${Math.ceil(i / namesPool.length)}`;
            let randomRarity = rarities[Math.floor(Math.random() * rarities.length)];
            
            brawlers.push({
                id: `brawler_${i}`,
                name: uniqueName,
                unlocked: false,
                level: 1,
                rarity: randomRarity
            });
        }
    }

    // Tab switcher
    function switchTab(tabId) {
        document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Box Open Rules
    function openBox(boxType) {
        let multiplier = 1;
        if (boxType === 'Big Box') multiplier = 3;
        if (boxType === 'Mega Box') multiplier = 10;
        if (boxType === 'Omega Box') multiplier = 20;

        let coinGain = (Math.floor(Math.random() * 50) + 30) * multiplier;
        let ppGain = (Math.floor(Math.random() * 20) + 10) * multiplier;

        resources.coins += coinGain;
        resources.powerPoints += ppGain;

        let content = `<div style="color:var(--bs-yellow)">${boxType}</div>`;
        content += `<div style="font-size: 1.8rem;">+🪙 ${coinGain}<br>+⚡ ${ppGain}</div>`;

        // Unlock roll
        let luckThreshold = 0.05 * multiplier; 
        if (Math.random() < luckThreshold) {
            let locked = brawlers.filter(b => !b.unlocked);
            if (locked.length > 0) {
                let picked = locked[Math.floor(Math.random() * locked.length)];
                picked.unlocked = true;
                content += `<br><div style="color:var(--legendary-color); font-size: 2rem;">🎉 UNLOCKED ${picked.name}!</div>`;
            }
        }

        showOverlay(content);
    }

    // Starr Drop Upgrading System
    function openStarrDrop() {
        let roll = Math.random();
        let dropTier = "Rare";
        let color = "var(--rare-color)";
        let coins = 50, pp = 20;

        if (roll > 0.95) { 
            dropTier = "Legendary"; color = "var(--legendary-color)"; coins = 500; pp = 200;
        } else if (roll > 0.85) { 
            dropTier = "Mythic"; color = "var(--mythic-color)"; coins = 200; pp = 100;
        } else if (roll > 0.65) { 
            dropTier = "Epic"; color = "var(--epic-color)"; coins = 100; pp = 50;
        } else if (roll > 0.35) { 
            dropTier = "Super-Rare"; color = "var(--super-rare-color)"; coins = 75; pp = 30;
        }

        resources.coins += coins;
        resources.powerPoints += pp;

        let content = `<div style="color:${color}; font-size: 3rem;">⚡ ${dropTier} Starr Drop ⚡</div>`;
        content += `<div style="font-size: 1.8rem; margin-top:10px;">+🪙 ${coins}<br>+⚡ ${pp}</div>`;

        if (dropTier === "Legendary" && Math.random() < 0.4) {
            let locked = brawlers.filter(b => !b.unlocked);
            if (locked.length > 0) {
                let picked = locked[Math.floor(Math.random() * locked.length)];
                picked.unlocked = true;
                content += `<br><div style="color:var(--bs-yellow)">✨ BRAWLER: ${picked.name}! ✨</div>`;
            }
        }

        showOverlay(content);
    }

    function showOverlay(htmlContent) {
        document.getElementById('rewardContent').innerHTML = htmlContent;
        document.getElementById('rewardOverlay').style.display = 'flex';
        updateUI();
    }

    function closeOverlay() {
        document.getElementById('rewardOverlay').style.display = 'none';
    }

    function upgradeBrawler(index) {
        let brawler = brawlers[index];
        let cost = brawler.level * 150;
        if (resources.coins >= cost && brawler.level < 11) {
            resources.coins -= cost;
            brawler.level++;
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('coins').innerText = resources.coins;
        document.getElementById('powerPoints').innerText = resources.powerPoints;
        
        let unlockedArr = brawlers.filter(b => b.unlocked);
        document.getElementById('unlockedCount').innerText = unlockedArr.length;

        const grid = document.getElementById('brawlersGrid');
        grid.innerHTML = '';

        brawlers.forEach((b, index) => {
            let card = document.createElement('div');
            card.className = `brawler-card ${b.unlocked ? 'unlocked' : ''} rarity-${b.rarity}`;
            
            card.innerHTML = `
                <div class="brawler-badge" style="color:var(--${b.rarity.toLowerCase()}-color)">${b.rarity}</div>
                <div style="height: 50px; font-size: 2rem; margin-top:15px;">👤</div>
                <div class="brawler-name">${b.name}</div>
                <div>Lvl: ${b.unlocked ? b.level : 'Locked'}</div>
            `;

            if (b.unlocked && b.level < 11) {
                let cost = b.level * 150;
                card.innerHTML += `<button class="upgrade-btn" onclick="event.stopPropagation(); upgradeBrawler(${index})">⚡ Up (${cost})</button>`;
            } else if (b.unlocked && b.level >= 11) {
                card.innerHTML += `<div style="color:var(--bs-yellow); font-size:0.9rem; margin-top:5px;">MAXED</div>`;
            }

            grid.appendChild(card);
        });
    }

    // Start Game Initialization
    generateAllBrawlers();
    updateUI();
</script>
</body>
</html>
