<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="resource-bar">
            <div class="resource"><img src="assets/coin.png" alt="Coins"> <span id="coins">1000</span></div>
            <div class="resource"><img src="assets/powerpoint.png" alt="Power Points"> <span id="powerpoints">500</span></div>
            <div class="resource"><img src="assets/bling.png" alt="Bling"> <span id="bling">250</span></div>
            <div class="resource"><img src="assets/gem.png" alt="Gems"> <span id="gems">50</span></div>
        </div>

        <div class="side-menu left-menu">
            <button class="menu-btn" onclick="openTab('shop')">🛒 Shop</button>
            <button class="menu-btn" onclick="openTab('brawlers')">🤠 Brawlers</button>
            <button class="menu-btn" onclick="openTab('brawlpass')">🎫 Brawl Pass</button>
        </div>

        <div id="center-stage">
            <div id="brawler-showcase">
                <img id="active-brawler-img" src="assets/shelly.png" alt="Shelly">
                <h2 id="active-brawler-name">Shelly</h2>
                <p>Power Level: <span id="active-brawler-level">1</span></p>
                <button id="upgrade-btn" onclick="upgradeActiveBrawler()">Upgrade (100 Coins, 50 PP)</button>
            </div>
        </div>

        <div class="side-menu right-menu">
            <button class="menu-btn" onclick="openTab('trophyroad')">🏆 Trophy Road</button>
            <button class="menu-btn" onclick="openTab('account')">👤 Account</button>
            <button class="menu-btn" onclick="openTab('buffies')">✨ Buffies</button>
        </div>

        <div id="modal" class="hidden">
            <div id="modal-content">
                <button id="close-modal" onclick="closeModal()">X</button>
                <div id="modal-body">
                    </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
