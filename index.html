<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Simulator For Brawl Stars - Play Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <div class="currency-badge">💰 <span id="gold-ui">0</span></div>
        <div class="currency-badge">💎 <span id="gems-ui">0</span></div>
        <div class="currency-badge">🏆 <span id="trophies-ui">0</span></div>
    </div>

    <div class="progression-shelf">
        <div class="shelf-title">🏆 Trophy Road Progression (Next reward at 1,000)</div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="trophy-fill"></div>
            <div class="progress-bar-text"><span id="trophy-text">0</span> / 1,000</div>
        </div>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('shop')">SHOP</button>
        <button class="tab-btn" onclick="switchTab('brawlers')">BRAWLERS</button>
        <button class="tab-btn" onclick="switchTab('battle')">BRAWL!</button>
    </div>

    <div class="view-panel active" id="panel-shop">
        <div class="shop-grid">
            <div class="box-item starr-drop-btn" onclick="generateBox('starr')">
                <h2>STARR DROP</h2>
                <small>Tap to test luck rarity upgrade tiers</small>
            </div>
            <div class="box-item big-box-btn" onclick="generateBox('big')">
                <h3>BIG BOX</h3>
                <small>💎 30 Gems</small>
            </div>
            <div class="box-item mega-box-btn" onclick="generateBox('mega')">
                <h3>MEGA BOX</h3>
                <small>💎 80 Gems</small>
            </div>
        </div>
    </div>

    <div class="view-panel" id="panel-brawlers">
        <div style="margin-bottom: 8px; font-size: 14px; text-align: left; color: #a0aec0;" id="unlock-fraction">Unlocked: 1 / 107</div>
        <div class="roster-grid" id="roster-container"></div>
    </div>

    <div class="view-panel" id="panel-battle">
        <div class="battle-pad">
            <h2>3v3 Match Simulator</h2>
            <p style="font-family: Arial; font-size:13px; color:#a0aec0;">Simulate standard Trophy matches to advance your Trophy Road and earn bonus Gold resources!</p>
            <button class="action-btn" onclick="runBattleEngine()">START MATCH</button>
            <div id="log-output" style="margin-top:15px; font-size:16px;"></div>
        </div>
    </div>
</div>

<div class="overlay-screen" id="opening-overlay" onclick="advanceRewardQueue()">
    <div class="reward-package" id="package-render"></div>
    <div class="badge-counter" id="badge-ui">0</div>
</div>

<script src="database.js"></script>
<script>
    let appState = {
        gold: 500, gems: 120, trophies: 0,
        unlocked: ["shelly"],
        gadgets: {}, starPowers: {}, hypercharges: {}
    };

    let rewardQueue = [], currentPointer = 0;

    function initEngine() {
        if(localStorage.getItem("play_store_bs_sim")) {
            appState = JSON.parse(localStorage.getItem("play_store_bs_sim"));
        }
        
        brawlersDatabase.forEach(b => {
            if(!appState.gadgets[b.id]) appState.gadgets[b.id] = [];
            if(!appState.starPowers[b.id]) appState.starPowers[b.id] = [];
            if(!appState.hypercharges[b.id]) appState.hypercharges[b.id] = [];
        });

        renderRosterUI();
        syncGlobalUI();
    }

    function syncGlobalUI() {
        document.getElementById("gold-ui").innerText = appState.gold;
        document.getElementById("gems-ui").innerText = appState.gems;
        document.getElementById("trophies-ui").innerText = appState.trophies;
        document.getElementById("trophy-text").innerText = appState.trophies;
        
        let roadPercent = Math.min((appState.trophies / 1000) * 100, 100);
        document.getElementById("trophy-fill").style.width = roadPercent + "%";
        document.getElementById("unlock-fraction").innerText = `Unlocked: ${appState.unlocked.length} / ${brawlersDatabase.length}`;
        
        localStorage.setItem("play_store_bs_sim", JSON.stringify(appState));
    }

    function renderRosterUI() {
        const target = document.getElementById("roster-container");
        target.innerHTML = "";
        
        brawlersDatabase.forEach(b => {
            let isUnlocked = appState.unlocked.includes(b.id);
            target.innerHTML += `
                <div class="brawler-card ${isUnlocked ? 'unlocked' : ''}">
                    <div class="rarity-lbl" style="color:var(--${b.rarity.toLowerCase().replace(' ', '-')})">${b.rarity.toUpperCase()}</div>
                    <img src="${b.img}" alt="${b.name}" onerror="this.src='https://media.brawltime.ninja/brawlers/shelly/avatar.png'">
                    <h4>${b.name}</h4>
                </div>`;
        });
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById(`panel-${tabId}`).classList.add('active');
    }

    function generateBox(type) {
        if(type === 'big') { if(appState.gems < 30) return alert("Insufficient Gems!"); appState.gems -= 30; }
        if(type === 'mega') { if(appState.gems < 80) return alert("Insufficient Gems!"); appState.gems -= 80; }

        rewardQueue = []; currentPointer = 0;

        if(type === 'starr') {
            let rarities = ["Rare", "Super Rare", "Epic", "Mythic", "Legendary"];
            let activeTier = rarities[0];
            let upgradeRoll = Math.random() * 100;
            
            if(upgradeRoll < 2) activeTier = rarities[4];
            else if(upgradeRoll < 7) activeTier = rarities[3];
            else if(upgradeRoll < 15) activeTier = rarities[2];
            else if(upgradeRoll < 40) activeTier = rarities[1];

            rewardQueue.push({ type: 'starr_drop_reveal', tier: activeTier });
        } else {
            let goldValue = type === 'mega' ? rand(350, 700) : rand(100, 250);
            rewardQueue.push({ type: 'gold', val: goldValue });

            let characterRoll = Math.random() * 100;
            if(characterRoll < 25) { 
                let lockedList = brawlersDatabase.filter(b => !appState.unlocked.includes(b.id));
                if(lockedList.length > 0) {
                    rewardQueue.push({ type: 'brawler', data: lockedList[Math.floor(Math.random() * lockedList.length)] });
                }
            }
        }

        document.getElementById("opening-overlay").style.display = "flex";
        advanceRewardQueue();
    }

    function advanceRewardQueue() {
        const renderZone = document.getElementById("package-render");
        const badge = document.getElementById("badge-ui");

        if(currentPointer < rewardQueue.length) {
            let item = rewardQueue[currentPointer];
            badge.innerText = rewardQueue.length - currentPointer - 1;

            if(item.type === 'starr_drop_reveal') {
                let colorKey = item.tier.toLowerCase().replace(' ', '-');
                renderZone.innerHTML = `<span style="color:var(--${colorKey})">${item.tier.toUpperCase()} STARR DROP!</span><br><br>🎁`;
                
                if(item.tier === 'Legendary' && Math.random() < 0.6) {
                    let lockedList = brawlersDatabase.filter(b => !appState.unlocked.includes(b.id));
                    if(lockedList.length > 0) rewardQueue.push({ type: 'brawler', data: lockedList[Math.floor(Math.random() * lockedList.length)] });
                } else {
                    rewardQueue.push({ type: 'gold', val: rand(200, 1000) });
                }
            }
            else if(item.type === 'gold') {
                appState.gold += item.val;
                renderZone.innerHTML = `💰<br>+${item.val}<br><span style="font-size:20px;">Gold Added</span>`;
            }
            else if(item.type === 'brawler') {
                appState.unlocked.push(item.data.id);
                renderZone.innerHTML = `⭐ NEW UNLOCK! ⭐<br><br><img src="${item.data.img}" style="width:110px; border-radius:12px;" onerror="this.src='https://media.brawltime.ninja/brawlers/shelly/avatar.png'"><br><span style="color:var(--starting)">${item.data.name.toUpperCase()}</span>`;
            }
            currentPointer++;
        } else {
            document.getElementById("opening-overlay").style.display = "none";
            renderRosterUI();
            syncGlobalUI();
        }
    }

    function runBattleEngine() {
        let victory = Math.random() < 0.55;
        let trophyDelta = victory ? 8 : -6;
        let goldPayout = victory ? rand(25, 60) : rand(5, 15);

        appState.trophies = Math.max(0, appState.trophies + trophyDelta);
        appState.gold += goldPayout;

        document.getElementById("log-output").innerHTML = `
            <div style="color:${victory ? '#46e246':'#ff4e70'}; font-size:20px; font-weight:bold; margin-bottom:5px;">
                ${victory ? 'VICTORY! 🎉' : 'MATCH DEFEAT 💔'}
            </div>
            <small style="font-family:Arial;">Trophies: ${trophyDelta > 0 ? '+':''}${trophyDelta} | Gold: +💰${goldPayout}</small>`;
        
        syncGlobalUI();
    }

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    window.onload = initEngine;
</script>
</body>
</html>
