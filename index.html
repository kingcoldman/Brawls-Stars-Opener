<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Box Simulator (Unofficial)</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #162447;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.5);
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: #1f4068;
            padding: 10px;
            border-radius: 8px;
        }
        button {
            background: #e43f5a;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            background: #ff4a6b;
        }
        .result-box {
            margin-top: 20px;
            min-height: 100px;
            padding: 15px;
            background: #1f4068;
            border-radius: 8px;
            font-size: 18px;
        }
        .unlock {
            color: #ffde7d;
            font-weight: bold;
            animation: pop 0.3s ease-in-out;
        }
        @keyframes pop {
            0% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }
        .disclaimer {
            font-size: 11px;
            color: #888;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Brawl Box Simulator</h2>
    
    <div class="stats">
        <div>Coins: <span id="coins">0</span></div>
        <div>Gems: <span id="gems">0</span></div>
        <div>Brawlers: <span id="brawler-count">0</span>/4</div>
    </div>

    <button onclick="openBox()">Open Brawl Box</button>

    <div class="result-box" id="result">Click the button to open a box!</div>
</div>

<p class="disclaimer">
    This material is unofficial and is not endorsed by Supercell. For more information see Supercell's Fan Content Policy: www.supercell.com/fan-content-policy.
</p>

<script>
    // Game State
    let player = {
        coins: 0,
        gems: 0,
        unlockedBrawlers: []
    };

    // Available Brawlers pool and their drop rates (weights)
    const brawlersPool = [
        { name: "Shelly", rarity: "Common", weight: 50 },
        { name: "El Primo", rarity: "Rare", weight: 30 },
        { name: "Piper", rarity: "Epic", weight: 15 },
        { name: "Leon", rarity: "Legendary", weight: 5 }
    ];

    function openBox() {
        const resultDiv = document.getElementById("result");
        
        // 1. Roll for random Currency rewards
        let coinsFound = Math.floor(Math.random() * 50) + 20; // 20-70 coins
        let gemsFound = Math.random() < 0.2 ? Math.floor(Math.random() * 5) + 3 : 0; // 20% chance for gems
        
        player.coins += coinsFound;
        player.gems += gemsFound;

        let outputText = `📦 <strong>Box Rewards:</strong><br>💰 +${coinsFound} Coins`;
        if (gemsFound > 0) outputText += `<br>💎 +${gemsFound} Gems`;

        // 2. Roll for a Brawler (15% chance to trigger a character pull)
        if (Math.random() < 0.15) {
            let pulledBrawler = getRandomBrawler();
            
            // Check if player already has them
            if (!player.unlockedBrawlers.includes(pulledBrawler.name)) {
                player.unlockedBrawlers.push(pulledBrawler.name);
                outputText += `<br><br><span class="unlock">⭐ NEW BRAWLER! UNLOCKED ${pulledBrawler.name.toUpperCase()} (${pulledBrawler.rarity})! ⭐</span>`;
            } else {
                // Duplicate fallback (like bonus coins)
                player.coins += 100;
                outputText += `<br><br>👟 Duplicate Pull: Got ${pulledBrawler.name} (Converted to +100 Coins)`;
            }
        }

        // Update the screen
        document.getElementById("coins").innerText = player.coins;
        document.getElementById("gems").innerText = player.gems;
        document.getElementById("brawler-count").innerText = player.unlockedBrawlers.length;
        resultDiv.innerHTML = outputText;
    }

    // Weighted Random Algorithm
    function getRandomBrawler() {
        let totalWeight = brawlersPool.reduce((sum, brawler) => sum + brawler.weight, 0);
        let randomNum = Math.random() * totalWeight;
        
        for (let i = 0; i < brawlersPool.length; i++) {
            if (randomNum < brawlersPool[i].weight) {
                return brawlersPool[i];
            }
            randomNum -= brawlersPool[i].weight;
        }
    }
</script>

</body>
</html>
